<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BALLONTV | إسبانيا ضد الأرجنتين - بث مباشر</title>
    
    <!-- مكتبة المشغل Clappr -->
    <script src="https://cdn.jsdelivr.net/clappr/latest/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/clappr.level-selector/latest/level-selector.min.js"></script>

    <style>
        :root {
            --main_color: #931800; 
            --body_bg: #eceef2;
            --header_bg: #fff;
            --header_color: #222;
            --card_bg: #ffffff;
            --text_color: #222;
        }

        /* الوضع الليلي */
        .Night {
            --body_bg: #121a23;
            --header_bg: #263545;
            --header_color: #fff;
            --card_bg: #1c2733;
            --text_color: #fff;
        }

        * { padding: 0; margin: 0; box-sizing: border-box; list-style: none; text-decoration: none; }
        body { background: var(--body_bg); color: var(--text_color); font-family: 'Segoe UI', Tahoma, sans-serif; transition: 0.3s; }

        header {
            background: var(--header_bg); padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: bold; color: var(--main_color); }
        .logo span { color: var(--header_color); }

        .btn-mode { cursor: pointer; background: var(--main_color); color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }

        .player-area { background: #000; width: 100%; aspect-ratio: 16/9; }
        #player { width: 100% !important; height: 100% !important; }

        .video-serv { display: flex; overflow-x: auto; background: #1f2024; padding: 10px; gap: 10px; }
        .video-serv span { 
            background: var(--main_color); color: white; padding: 8px 18px; 
            border-radius: 4px; cursor: pointer; font-size: 14px; white-space: nowrap; 
            border-bottom: 3px solid transparent;
        }
        .video-serv span.active { background: #444; border-bottom: 3px solid #fff; }

        .container { padding: 15px; max-width: 1000px; margin: auto; }

        .ad-box { background: #fff; border: 1px solid #ddd; margin-bottom: 15px; padding: 10px; text-align: center; border-radius: 8px; }
        .ad-box a { color: var(--main_color); font-weight: bold; font-size: 14px; }

        /* بطاقة المباراة المحدثة */
        .match-banner {
            background: #1c2733; border-radius: 8px; overflow: hidden; margin-bottom: 20px;
            border: 2px solid var(--main_color); cursor: pointer;
        }
        .match-head { background: var(--main_color); color: white; padding: 8px; text-align: center; font-size: 14px; font-weight: bold; }
        .match-teams { display: flex; align-items: center; justify-content: space-around; padding: 25px 10px; color: white; }
        .team { text-align: center; width: 40%; }
        .flag { font-size: 50px; display: block; margin-bottom: 5px; }
        .team-name { font-size: 18px; font-weight: bold; }
        .vs { font-size: 28px; font-weight: bold; color: var(--main_color); background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 5px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .ch-card { background: var(--card_bg); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #ddd; cursor: pointer; }

        .floating-btn {
            position: fixed; bottom: 20px; left: 20px; background: #0088cc;
            color: white; padding: 10px 15px; border-radius: 50px; font-weight: bold; z-index: 1000;
        }

        footer { text-align: center; padding: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body id="bodyTag">

<header>
    <div class="logo">BALLON<span>TV</span></div>
    <div class="btn-mode" onclick="toggleMode()">الوضع الليلي</div>
</header>

<!-- المشغل -->
<div class="player-area">
    <div id="player"></div>
</div>

<!-- السيرفرات المتعددة -->
<div class="video-serv" id="server-list">
    <!-- السيرفرات ستظهر هنا تلقائياً -->
</div>

<div class="container">

    <div class="ad-box">
        <a href="https://omg10.com/4/10270118" target="_blank">📲 تحميل تطبيق BALLONTV لمشاهدة المباريات بدون تقطيع</a>
    </div>

    <!-- بطاقة مباراة إسبانيا والأرجنتين -->
    <div class="match-banner" onclick="loadChannel(0)">
        <div class="match-head">بث مباشر | نهائي الفيناليسيما المرتقب</div>
        <div class="match-teams">
            <div class="team">
                <span class="flag">🇪🇸</span>
                <div class="team-name">إسبانيا</div>
            </div>
            <div class="vs">VS</div>
            <div class="team">
                <span class="flag">🇦🇷</span>
                <div class="team-name">الأرجنتين</div>
            </div>
        </div>
        <div style="text-align: center; padding-bottom: 10px; color: #aaa; font-size: 12px;">اختر السيرفر المناسب من الأعلى وابدأ المشاهدة</div>
    </div>

    <h3 style="margin-bottom: 15px; border-right: 4px solid var(--main_color); padding-right: 10px;">القنوات الناقلة</h3>
    <div class="grid">
        <div class="ch-card" onclick="loadChannel(1)"><strong>beIN MAX 1</strong><span>4K Quality</span></div>
        <div class="ch-card" onclick="loadChannel(2)"><strong>beIN MAX 2</strong><span>Full HD</span></div>
    </div>

</div>

<a href="https://omg10.com/4/10241472" class="floating-btn" target="_blank">سيرفر احتياطي 🔥</a>

<footer>BALLONTV &copy; 2024 - جميع الحقوق محفوظة</footer>

<script>
    // بيانات القنوات والسيرفرات المتعددة لمباراة إسبانيا والأرجنتين
    const db = [
        {
            name: "إسبانيا ضد الأرجنتين",
            servers: [
                { title: "سيرفر 1 | رئيسي", url: "https://table.houseinventer.com/pdf/AzMjD2IyADQPb2tLfQ/index.m3u8" },
                { title: "سيرفر 2 | متعدد الجودات", url: "https://channel01-onlymex.akamaized.net/hls/live/2022749/event01/index_4.m3u8" },
                { title: "سيرفر 3 | إنترنت ضعيف", url: "https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8" },
                { title: "سيرفر 4 | YouTube", url: "https://andro.226503.xyz/checklist/androstreamlivebs1.m3u8" },
                { title: "سيرفر 5 | احتياطي 1", url: "http://40.160.24.55/TSN_1/index.m3u8" },
                { title: "سيرفر 6 | احتياطي 2", url: "https://andro.226503.xyz/checklist/androstreamlivebs1.m3u8" }
            ]
        },
        {
            name: "beIN MAX 1",
            servers: [
                { title: "سيرفر HD", url: "https://table.houseinventer.com/pdf/AzMjD2IyADQPb2tLfQ/index.m3u8" }
            ]
        },
        {
            name: "beIN MAX 2",
            servers: [
                { title: "سيرفر HD", url: "https://table.houseinventer.com/pdf/AzMjD2IyADQPb2tLfQ/index.m3u8" }
            ]
        }
    ];

    // إعداد المشغل
    var player = new Clappr.Player({
        source: db[0].servers[0].url,
        parentId: "#player",
        plugins: [LevelSelector],
        width: '100%',
        height: '100%',
        autoPlay: false,
        mediacontrol: {seekbar: "#931800", buttons: "#931800"}
    });

    // وظيفة تبديل القنوات والسيرفرات
    function loadChannel(index) {
        const ch = db[index];
        const serverList = document.getElementById('server-list');
        serverList.innerHTML = ''; 
        
        ch.servers.forEach((srv, i) => {
            const btn = document.createElement('span');
            btn.innerText = srv.title;
            btn.className = (i === 0) ? 'active' : '';
            btn.onclick = () => {
                player.configure({ source: srv.url });
                player.play();
                document.querySelectorAll('.video-serv span').forEach(s => s.classList.remove('active'));
                btn.classList.add('active');
                if(Math.random() > 0.7) window.open("https://omg10.com/4/9047517", "_blank");
            };
            serverList.appendChild(btn);
        });

        player.configure({ source: ch.servers[0].url });
        player.play();
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function toggleMode() {
        document.body.classList.toggle('Night');
    }

    loadChannel(0);

    document.body.addEventListener('click', function() {
        if (!window.adsOnce) {
            window.open("https://omg10.com/4/10241472", "_blank");
            window.adsOnce = true;
        }
    }, { once: true });
</script>

</body>
</html>
